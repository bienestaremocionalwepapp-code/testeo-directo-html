<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gestor de Pendientes — Bienestar Emocional</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════════
   VARIABLES & RESET
══════════════════════════════════════════ */
:root {
  --rosa:    #FF85C0;
  --morado:  #A67FFF;
  --rosaP:   #FFE5F0;
  --moradoP: #EDE5FF;
  --dark:    #1A1228;
  --card:    #FFFFFF;
  --bg:      #F7F3FF;
  --border:  #E8DFFF;
  --text:    #2D2040;
  --mid:     #6B5F85;
  --ok:      #22C55E;
  --warn:    #F59E0B;
  --err:     #EF4444;
  --info:    #3B82F6;
  --mono:    'DM Mono', monospace;
  --r:       16px;
}
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ══════════════════════════════════════════
   LOGIN
══════════════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: var(--dark);
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
}
#login-screen.hide { display: none; }
.login-bg {
  position: absolute; inset: 0; overflow: hidden; pointer-events: none;
}
.login-blob {
  position: absolute; border-radius: 50%; filter: blur(80px); opacity: .25;
  animation: blobDrift 14s ease-in-out infinite alternate;
}
.login-blob:nth-child(1) { width:500px; height:500px; background:var(--morado); top:-100px; left:-150px; animation-duration:12s; }
.login-blob:nth-child(2) { width:400px; height:400px; background:var(--rosa); bottom:-80px; right:-100px; animation-duration:16s; animation-delay:-5s; }
.login-blob:nth-child(3) { width:300px; height:300px; background:#6FECFF; top:40%; left:40%; animation-duration:10s; animation-delay:-3s; }
@keyframes blobDrift { to { transform: translate(60px, 80px) rotate(15deg); } }

.login-card {
  position: relative; z-index: 2;
  width: 400px; max-width: 94vw;
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 28px;
  padding: 2.8rem 2.4rem;
  backdrop-filter: blur(32px);
  box-shadow: 0 40px 80px rgba(0,0,0,.5), inset 0 1px 0 rgba(255,255,255,.1);
  animation: slideUp .5s cubic-bezier(.16,1,.3,1);
}
@keyframes slideUp { from { opacity:0; transform:translateY(40px) scale(.95); } to { opacity:1; transform:none; } }

.lc-icon {
  width: 64px; height: 64px; border-radius: 18px; margin: 0 auto 1.2rem;
  background: linear-gradient(135deg, var(--rosa), var(--morado));
  display: flex; align-items: center; justify-content: center;
  font-size: 2rem;
  box-shadow: 0 12px 36px rgba(166,127,255,.5);
  animation: iconPulse 3s ease-in-out infinite;
}
@keyframes iconPulse { 0%,100%{box-shadow:0 12px 36px rgba(166,127,255,.5);} 50%{box-shadow:0 12px 60px rgba(166,127,255,.8);} }

.lc-title { font-family:'Playfair Display',serif; font-size:1.5rem; font-weight:800; color:#fff; text-align:center; }
.lc-sub   { font-size:.8rem; color:rgba(255,255,255,.35); text-align:center; margin-top:.3rem; margin-bottom:2rem; }

.lc-field { margin-bottom:1rem; }
.lc-label { display:block; font-size:.68rem; font-weight:700; color:rgba(255,255,255,.4); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.4rem; }
.lc-wrap  { position:relative; }
.lc-ico   { position:absolute; left:.9rem; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; }
.lc-inp   {
  width:100%; padding:.82rem 1rem .82rem 2.6rem;
  background: rgba(255,255,255,.08); border: 1.5px solid rgba(255,255,255,.12);
  border-radius: 12px; font-family:'DM Sans',sans-serif; font-size:.95rem;
  color:#fff; outline:none; transition:all .2s;
}
.lc-inp::placeholder { color:rgba(255,255,255,.2); }
.lc-inp:focus { border-color:var(--morado); background:rgba(166,127,255,.12); box-shadow:0 0 0 3px rgba(166,127,255,.2); }
.lc-inp.bad  { border-color:var(--err); animation:shake .4s; }
.lc-eye { position:absolute; right:.85rem; top:50%; transform:translateY(-50%); background:none; border:none; cursor:pointer; font-size:.95rem; color:rgba(255,255,255,.3); transition:color .2s; }
.lc-eye:hover { color:rgba(255,255,255,.7); }
@keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-5px)} 40%,80%{transform:translateX(5px)} }

.lc-btn {
  width:100%; margin-top:.5rem; padding:.95rem;
  background: linear-gradient(135deg,var(--rosa),var(--morado));
  border:none; border-radius:13px; color:#fff;
  font-family:'DM Sans',sans-serif; font-size:.98rem; font-weight:700;
  cursor:pointer; box-shadow:0 6px 24px rgba(166,127,255,.45);
  transition:all .25s;
}
.lc-btn:hover:not(:disabled) { transform:translateY(-2px); box-shadow:0 10px 32px rgba(166,127,255,.6); }
.lc-btn:disabled { opacity:.5; cursor:not-allowed; transform:none; }
.lc-err {
  background:rgba(239,68,68,.12); border:1px solid rgba(239,68,68,.3);
  border-radius:10px; padding:.65rem .95rem; font-size:.82rem; color:#fca5a5;
  margin-top:.85rem; display:none;
}
.lc-err.show { display:block; animation:shake .4s; }

/* ══════════════════════════════════════════
   APP LAYOUT
══════════════════════════════════════════ */
#app { display:none; flex-direction:column; min-height:100vh; }
#app.on { display:flex; }

/* ── Topbar ── */
.topbar {
  background: var(--card);
  border-bottom: 1px solid var(--border);
  padding: .9rem 1.8rem;
  display: flex; align-items: center; justify-content: space-between;
  position: sticky; top:0; z-index:100;
  box-shadow: 0 2px 16px rgba(166,127,255,.08);
}
.tb-left { display:flex; align-items:center; gap:.85rem; }
.tb-logo {
  width:38px; height:38px; border-radius:11px;
  background:linear-gradient(135deg,var(--rosa),var(--morado));
  display:flex; align-items:center; justify-content:center; font-size:1.15rem;
  flex-shrink:0;
}
.tb-brand { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; }
.tb-brand span { color:var(--morado); }
.tb-right { display:flex; align-items:center; gap:.6rem; }
.tb-user {
  display:flex; align-items:center; gap:.5rem;
  background:var(--bg); border:1px solid var(--border);
  border-radius:50px; padding:.28rem .85rem .28rem .38rem;
}
.tb-avatar {
  width:26px; height:26px; border-radius:50%;
  background:linear-gradient(135deg,var(--rosa),var(--morado));
  display:flex; align-items:center; justify-content:center;
  color:#fff; font-size:.75rem; font-weight:700; flex-shrink:0;
}
.tb-uname { font-size:.82rem; font-weight:600; }
.btn-out { font-size:.78rem; }

/* ══════════════════════════════════════════
   MAIN
══════════════════════════════════════════ */
.main { flex:1; padding:1.6rem; max-width:1400px; margin:0 auto; width:100%; }

/* ── Stats bar ── */
.stats-bar {
  display:grid; grid-template-columns:repeat(5, 1fr); gap:.75rem;
  margin-bottom:1.4rem;
}
.stat-card {
  background:var(--card); border:1.5px solid var(--border);
  border-radius:var(--r); padding:1rem 1.2rem;
  display:flex; align-items:center; gap:.85rem;
  cursor:pointer; transition:all .2s;
  position:relative; overflow:hidden;
}
.stat-card::before {
  content:''; position:absolute; inset:0; opacity:0; transition:opacity .2s;
}
.stat-card:hover::before, .stat-card.on::before { opacity:1; }
.stat-card.s-all::before    { background:linear-gradient(135deg,rgba(232,223,255,.5),rgba(255,229,240,.4)); }
.stat-card.s-pend::before   { background:rgba(245,158,11,.07); }
.stat-card.s-esp::before    { background:rgba(59,130,246,.07); }
.stat-card.s-conf::before   { background:rgba(34,197,94,.07); }
.stat-card.s-canc::before   { background:rgba(239,68,68,.07); }
.stat-card.on { border-width:2px; }
.stat-card.s-all.on  { border-color:var(--morado); }
.stat-card.s-pend.on { border-color:var(--warn); }
.stat-card.s-esp.on  { border-color:var(--info); }
.stat-card.s-conf.on { border-color:var(--ok); }
.stat-card.s-canc.on { border-color:var(--err); }
.stat-ico  { font-size:1.6rem; position:relative; z-index:1; }
.stat-info { position:relative; z-index:1; }
.stat-n    { font-family:'Playfair Display',serif; font-size:1.8rem; font-weight:800; line-height:1; }
.stat-lbl  { font-size:.72rem; color:var(--mid); font-weight:600; margin-top:.15rem; }

/* ── Toolbar ── */
.toolbar {
  display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
  margin-bottom:1.2rem;
}
.search-wrap {
  flex:1; min-width:200px; position:relative;
}
.search-wrap input {
  width:100%; padding:.65rem 1rem .65rem 2.5rem;
  border:1.5px solid var(--border); border-radius:50px;
  font-family:'DM Sans',sans-serif; font-size:.88rem;
  background:#fff; color:var(--text); outline:none;
  transition:all .2s;
}
.search-wrap input:focus { border-color:var(--morado); box-shadow:0 0 0 3px rgba(166,127,255,.12); }
.search-ico { position:absolute; left:.85rem; top:50%; transform:translateY(-50%); opacity:.4; pointer-events:none; }
.sort-sel {
  padding:.62rem 1rem; border:1.5px solid var(--border); border-radius:50px;
  font-family:'DM Sans',sans-serif; font-size:.85rem; color:var(--text);
  background:#fff; outline:none; cursor:pointer;
}
.btn {
  display:inline-flex; align-items:center; gap:.4rem;
  padding:.6rem 1.2rem; border-radius:50px;
  font-family:'DM Sans',sans-serif; font-size:.84rem; font-weight:600;
  cursor:pointer; border:none; transition:all .2s; white-space:nowrap;
}
.btn-primary { background:linear-gradient(135deg,var(--rosa),var(--morado)); color:#fff; box-shadow:0 4px 14px rgba(166,127,255,.35); }
.btn-primary:hover { transform:translateY(-1px); box-shadow:0 6px 22px rgba(166,127,255,.5); }
.btn-ghost  { background:transparent; color:var(--mid); border:1.5px solid var(--border); }
.btn-ghost:hover { border-color:var(--morado); color:var(--morado); }
.btn-sm { padding:.4rem .9rem; font-size:.78rem; }
.btn-danger { background:#fef2f2; color:var(--err); border:1.5px solid #fecaca; }
.btn-danger:hover { background:var(--err); color:#fff; }
.btn-ok   { background:#f0fdf4; color:var(--ok); border:1.5px solid #bbf7d0; }
.btn-ok:hover { background:var(--ok); color:#fff; }

/* ── Grid ── */
.grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:1rem;
}
.empty-state {
  grid-column:1/-1; text-align:center; padding:5rem 1rem; color:var(--mid);
}
.empty-ico { font-size:3.5rem; opacity:.3; margin-bottom:1rem; }
.empty-txt { font-size:.92rem; }

/* ── Card ── */
.pcard {
  background:var(--card);
  border:1.5px solid var(--border);
  border-radius:20px; overflow:hidden;
  transition:all .22s; cursor:pointer;
  position:relative;
}
.pcard:hover {
  transform:translateY(-4px);
  box-shadow:0 16px 48px rgba(166,127,255,.18);
  border-color:var(--morado);
}
.pcard-accent {
  height: 4px;
  background: linear-gradient(90deg, var(--rosa), var(--morado));
}
.pcard-accent.a-pend   { background:linear-gradient(90deg,#F59E0B,#FBBF24); }
.pcard-accent.a-espera { background:linear-gradient(90deg,#3B82F6,#60A5FA); }
.pcard-accent.a-conf   { background:linear-gradient(90deg,#22C55E,#4ADE80); }
.pcard-accent.a-canc   { background:linear-gradient(90deg,#EF4444,#F87171); }

.pcard-head {
  padding:.95rem 1.15rem .7rem;
  display:flex; align-items:flex-start; justify-content:space-between; gap:.5rem;
}
.pcard-nombre { font-family:'Playfair Display',serif; font-size:1rem; font-weight:700; }
.pcard-id     { font-family:var(--mono); font-size:.65rem; color:var(--mid); margin-top:2px; }
.chip {
  display:inline-flex; align-items:center; gap:.3rem;
  padding:.2rem .75rem; border-radius:50px; font-size:.7rem; font-weight:700;
  white-space:nowrap; flex-shrink:0;
}
.chip-pend  { background:#fffbeb; color:var(--warn); }
.chip-esp   { background:#eff6ff; color:var(--info); }
.chip-conf  { background:#f0fdf4; color:var(--ok); }
.chip-canc  { background:#fef2f2; color:var(--err); }

.pcard-body {
  padding:0 1.15rem .85rem;
  font-size:.82rem; color:var(--mid); line-height:1.7;
}
.pcard-body strong { color:var(--text); font-weight:600; }
.pcard-tipo {
  display:inline-flex; align-items:center; gap:.3rem;
  background:var(--moradoP); color:var(--morado);
  padding:.15rem .65rem; border-radius:50px; font-size:.68rem; font-weight:700;
  margin-bottom:.5rem;
}
.pcard-cita {
  margin-top:.5rem; padding:.5rem .75rem;
  background:linear-gradient(135deg,var(--rosaP),var(--moradoP));
  border-radius:10px; font-size:.78rem; font-weight:600; color:var(--text);
}
.pcard-foot {
  padding:.65rem 1.15rem;
  background:var(--bg); border-top:1px solid var(--border);
  display:flex; align-items:center; justify-content:space-between;
}
.pcard-ts   { font-size:.68rem; color:var(--mid); }
.pcard-act  { font-size:.73rem; color:var(--morado); font-weight:700; }

/* ── Skeleton ── */
.skeleton { border-radius:var(--r); overflow:hidden; background:var(--card); border:1.5px solid var(--border); }
.skel {
  background:linear-gradient(90deg,var(--border) 25%,var(--moradoP) 50%,var(--border) 75%);
  background-size:200% 100%; animation:skelMove 1.5s infinite; border-radius:6px; height:14px; margin-bottom:.5rem;
}
@keyframes skelMove { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

/* ════════════════════════════════════
   MODAL AGENDAR
════════════════════════════════════ */
.overlay {
  display:none; position:fixed; inset:0; z-index:5000;
  background:rgba(26,18,40,.88); backdrop-filter:blur(10px);
  align-items:center; justify-content:center; padding:1rem;
}
.overlay.show { display:flex; }
.om {
  background:var(--card); border-radius:24px;
  width:640px; max-width:100%; max-height:90vh; overflow-y:auto;
  box-shadow:0 32px 80px rgba(0,0,0,.35);
  animation:omIn .3s cubic-bezier(.16,1,.3,1);
  position:relative;
}
@keyframes omIn { from{opacity:0;transform:scale(.94) translateY(20px);} to{opacity:1;transform:none;} }
.om-close {
  position:sticky; top:0; float:right; margin:1rem 1rem 0 0;
  background:var(--bg); border:none; border-radius:50%;
  width:32px; height:32px; display:flex; align-items:center; justify-content:center;
  font-size:1.1rem; cursor:pointer; color:var(--mid); z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,.1);
}
.om-close:hover { background:var(--border); }
.om-body { padding:1.6rem 1.8rem 1.8rem; clear:both; }
.om-title {
  font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:800;
  color:var(--text); margin-bottom:1.3rem;
  display:flex; align-items:center; gap:.6rem;
}

/* Contexto solicitante */
.ctx-box {
  background:linear-gradient(135deg,var(--moradoP),var(--rosaP));
  border:1.5px solid var(--border); border-radius:14px;
  padding:1rem 1.15rem; margin-bottom:1.3rem;
}
.ctx-nombre { font-family:'Playfair Display',serif; font-size:1.05rem; font-weight:700; margin-bottom:.35rem; }
.ctx-info   { display:flex; flex-wrap:wrap; gap:.3rem .9rem; font-size:.8rem; color:var(--mid); }
.ctx-info span { display:flex; align-items:center; gap:.3rem; }
.ctx-motivo { margin-top:.5rem; font-size:.8rem; color:var(--mid); }
.ctx-origen {
  display:inline-flex; align-items:center; gap:.3rem;
  margin-top:.5rem; background:rgba(166,127,255,.15); color:var(--morado);
  padding:.2rem .75rem; border-radius:50px; font-size:.7rem; font-weight:700;
}

/* Slots */
.sec-label {
  font-size:.68rem; font-weight:700; color:var(--mid);
  text-transform:uppercase; letter-spacing:.1em; margin-bottom:.65rem;
}
.slots-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(120px,1fr));
  gap:.55rem; max-height:210px; overflow-y:auto; padding-right:2px;
  margin-bottom:1.2rem;
}
.slot {
  background:linear-gradient(135deg,var(--rosaP),var(--moradoP));
  border:1.5px solid var(--border); border-radius:14px;
  padding:.7rem .55rem; text-align:center; cursor:pointer; transition:all .2s;
}
.slot:hover, .slot.sel {
  background:linear-gradient(135deg,var(--rosa),var(--morado));
  border-color:transparent; color:#fff;
}
.slot:hover .s-dia,.slot.sel .s-dia,
.slot:hover .s-mes,.slot.sel .s-mes,
.slot:hover .s-hora,.slot.sel .s-hora { color:#fff !important; }
.s-dia  { font-size:.6rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.07em; }
.s-num  { font-family:'Playfair Display',serif; font-size:1.3rem; font-weight:800; line-height:1.1; }
.s-mes  { font-size:.63rem; color:var(--mid); }
.s-hora { font-size:.7rem; font-weight:700; color:var(--morado); margin-top:.3rem; }
.slot-loading { text-align:center; padding:2rem; color:var(--mid); font-size:.84rem; }
.slot-spin { width:26px; height:26px; border:3px solid var(--moradoP); border-top-color:var(--morado); border-radius:50%; animation:spin .7s linear infinite; margin:0 auto .6rem; }
@keyframes spin { to{transform:rotate(360deg);} }
.no-slots  { text-align:center; padding:1.5rem; color:var(--mid); font-size:.84rem; }

/* Notificaciones */
.notif-box {
  background:var(--bg); border:1.5px solid var(--border);
  border-radius:14px; padding:1rem 1.15rem; margin-bottom:1.1rem;
}
.notif-box-title { font-size:.68rem; font-weight:700; color:var(--mid); text-transform:uppercase; letter-spacing:.1em; margin-bottom:.7rem; }
.notif-check { display:flex; align-items:flex-start; gap:.65rem; cursor:pointer; margin-bottom:.55rem; }
.notif-check input { width:16px; height:16px; margin-top:2px; accent-color:var(--morado); flex-shrink:0; }
.notif-check-txt strong { display:block; font-size:.83rem; color:var(--text); font-weight:600; }
.notif-check-txt small  { font-size:.72rem; color:var(--mid); }
.notif-msg {
  width:100%; margin-top:.6rem; padding:.65rem .9rem;
  border:1.5px solid var(--border); border-radius:10px;
  font-family:'DM Sans',sans-serif; font-size:.83rem; color:var(--text);
  background:#fff; resize:vertical; min-height:68px; outline:none; transition:border .2s;
}
.notif-msg:focus { border-color:var(--morado); }

.om-actions { display:flex; gap:.7rem; }
.om-actions .btn { flex:1; justify-content:center; }

/* ── Estado cambio rápido ── */
.estado-btns { display:flex; gap:.4rem; flex-wrap:wrap; margin-top:.8rem; }
.est-btn {
  padding:.3rem .8rem; border-radius:50px; border:1.5px solid var(--border);
  font-family:'DM Sans',sans-serif; font-size:.72rem; font-weight:700;
  cursor:pointer; transition:all .18s; background:var(--card);
}
.est-btn:hover { transform:scale(1.04); }
.est-cancelar:hover { background:var(--err); color:#fff; border-color:var(--err); }
.est-confirmar:hover { background:var(--ok); color:#fff; border-color:var(--ok); }

/* ── Toasts ── */
.toasts {
  position:fixed; bottom:1.5rem; right:1.5rem;
  display:flex; flex-direction:column; gap:.5rem; z-index:9999;
  pointer-events:none;
}
.toast {
  background:var(--dark); color:#fff;
  padding:.8rem 1.2rem; border-radius:12px; font-size:.84rem; font-weight:600;
  max-width:300px; box-shadow:0 8px 28px rgba(0,0,0,.3);
  animation:toastIn .3s ease; pointer-events:auto;
}
@keyframes toastIn { from{opacity:0;transform:translateX(50px);} to{opacity:1;transform:none;} }

/* ── Spinner global ── */
.g-spin {
  width:36px; height:36px;
  border:3px solid var(--moradoP); border-top-color:var(--morado);
  border-radius:50%; animation:spin .7s linear infinite; margin:3rem auto;
}

/* ── Responsive ── */
@media(max-width:680px){
  .stats-bar{grid-template-columns:1fr 1fr;}
  .stat-card.s-all{grid-column:1/-1;}
  .grid{grid-template-columns:1fr;}
  .toolbar{flex-direction:column; align-items:stretch;}
  .search-wrap{min-width:unset;}
  .om-body{padding:1.2rem;}
}
</style>
</head>
<body>

<!-- ══════════════════════════════════
     PANTALLA DE LOGIN
══════════════════════════════════ -->
<div id="login-screen">
  <div class="login-bg">
    <div class="login-blob"></div>
    <div class="login-blob"></div>
    <div class="login-blob"></div>
  </div>
  <div class="login-card">
    <div class="lc-icon">📋</div>
    <div class="lc-title">Gestor de Pendientes</div>
    <div class="lc-sub">Bienestar Emocional · Acceso restringido</div>

    <div class="lc-field">
      <label class="lc-label">Usuario</label>
      <div class="lc-wrap">
        <span class="lc-ico">👤</span>
        <input class="lc-inp" type="text" id="lu" placeholder="tu usuario" autocomplete="username"
               onkeydown="if(event.key==='Enter')doLogin()">
      </div>
    </div>
    <div class="lc-field">
      <label class="lc-label">Contraseña</label>
      <div class="lc-wrap">
        <span class="lc-ico">🔒</span>
        <input class="lc-inp" type="password" id="lp" placeholder="••••••••" autocomplete="current-password"
               onkeydown="if(event.key==='Enter')doLogin()">
        <button class="lc-eye" type="button" onclick="togglePwd()">👁</button>
      </div>
    </div>
    <button class="lc-btn" id="lbtn" onclick="doLogin()">Entrar al gestor</button>
    <div class="lc-err" id="lerr"></div>
  </div>
</div>

<!-- ══════════════════════════════════
     APP
══════════════════════════════════ -->
<div id="app">

  <div class="topbar">
    <div class="tb-left">

      </div>
      <div class="stat-card s-pend" onclick="setFiltro('Pendiente',this)">

      <div class="stat-card s-esp" onclick="setFiltro('En espera',this)">

      </div>
      <div class="stat-card s-conf" onclick="setFiltro('Confirmado',this)">

    <!-- Toolbar -->

        <option value="reciente">Más recientes</option>
        <option value="nombre">Nombre A-Z</option>

</div>

<!-- ══════════════════════════════════

══════════════════════════════════ -->
<div class="overlay" id="modal-overlay">

      <!-- Slots -->

        <div class="slot-loading"><div class="slot-spin"></div>Cargando disponibilidad…</div>

            <small>Abre wa.me con mensaje prellenado en nueva pestaña</small>
          </div>

          <input type="checkbox" id="n-email" checked>
          <div class="notif-check-txt">
            <strong>Correo al solicitante</strong>
            <small>Vía Apps Script — solo funciona si tiene correo registrado</small>
          </div>

        <label class="notif-check">
          <input type="checkbox" id="n-admin" checked>
          <div class="notif-check-txt">
            <strong>Notificación al administrador</strong>
            <small>WhatsApp con resumen de la cita</small>
          </div>

        <textarea class="notif-msg" id="n-msg" placeholder="Mensaje adicional al solicitante (opcional)…"></textarea>

        <button class="btn btn-primary" id="btn-confirmar" onclick="confirmarCita()" disabled>
          📨 Confirmar y notificar
        </button>

<div class="toasts" id="toasts"></div>

<script>
'use strict';
/* ════════════════════════════════════════════
   CONFIGURACIÓN — cambia solo PROXY y WA_ADMIN
════════════════════════════════════════════ */
var PROXY    = 'https://script.google.com/macros/s/AKfycbz-_1X-c3aZ2lJ4N6m3R5tP2l2cznIs7Seuvkb5X5J1oPVrIXDwkEHi936b4dXg5JxO/exec';
var WA_ADMIN = '524425839311';

var DIAS  = ['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
var MESES = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];

/* ── Estado de la app ── */
var currentUser   = null;
var pendientes    = [];   // todos los registros cargados
var filtroActivo  = 'todos';
var slotsCache    = null; // { slots:[], ts:number }
var registroActivo = null;
var slotActivo     = null;
var inactTimer     = null;
var INACT_MS       = 25 * 60 * 1000;

/* ════════════════════════════════════════════
   API HELPERS
════════════════════════════════════════════ */
function apiGet(tab) {
  return fetch(PROXY + '?tab=' + encodeURIComponent(tab), { redirect: 'follow' })
    .then(r => r.text())
    .then(t => { var j = JSON.parse(t); if (!j.ok) throw new Error(j.error || 'Error'); return j; });
}
function apiPost(action, payload) {
  return fetch(PROXY, {
    method: 'POST', redirect: 'follow',
    headers: { 'Content-Type': 'text/plain' },
    body: JSON.stringify(Object.assign({ action: action }, payload))
  }).then(r => r.text())
    .then(t => { var j = JSON.parse(t); if (!j.ok) throw new Error(j.error || 'Error'); return j; });
}

/* ════════════════════════════════════════════
   AUTH
════════════════════════════════════════════ */
function doLogin() {
  var lu = $('lu').value.trim(), lp = $('lp').value;
  var btn = $('lbtn');
  if (!lu || !lp) { showErr('Completa usuario y contraseña.'); return; }
  btn.disabled = true; btn.textContent = '⏳ Verificando…';

  apiGet('Usuarios').then(j => {
    var data = j.data || {};
    var users = [], i = 1;
    while (data['login_' + i] !== undefined) {
      if (data['login_' + i]) users.push({
        login: data['login_' + i], pass: data['pass_' + i],
        nombre: data['nombre_' + i], rol: data['rol_' + i], activo: data['activo_' + i]
      });
      i++;
    }
    var user = users.find(u => u.login === lu && u.pass === lp && u.activo === 'true');
    if (user) {
      currentUser = user;
      sessionStorage.setItem('be_pend_sess', JSON.stringify({ login: user.login, nombre: user.nombre, rol: user.rol, ts: Date.now() }));
      launchApp(user);
    } else {
      showErr('Usuario o contraseña incorrectos.');
      btn.disabled = false; btn.textContent = 'Entrar al gestor';
    }
  }).catch(e => {
    showErr('Error de conexión: ' + e.message);
    btn.disabled = false; btn.textContent = 'Entrar al gestor';
  });
}

function launchApp(user) {
  $('login-screen').classList.add('hide');
  $('app').classList.add('on');
  $('uav').textContent   = user.nombre.charAt(0).toUpperCase();
  $('uname').textContent = user.nombre;
  resetInact();
  document.addEventListener('mousemove', resetInact);
  document.addEventListener('keydown', resetInact);
  cargarPendientes();
}

function doLogout() {
  if (!confirm('¿Cerrar sesión?')) return;
  clearTimeout(inactTimer);
  currentUser = null;
  sessionStorage.removeItem('be_pend_sess');
  $('login-screen').classList.remove('hide');
  $('app').classList.remove('on');
  $('lu').value = ''; $('lp').value = '';
  $('lbtn').disabled = false; $('lbtn').textContent = 'Entrar al gestor';
}

function resetInact() {
  clearTimeout(inactTimer);
  inactTimer = setTimeout(() => { toast('Sesión cerrada por inactividad', 'warn'); doLogout(); }, INACT_MS);
}

function showErr(m) {
  var e = $('lerr'); e.textContent = m;
  e.classList.remove('show'); void e.offsetWidth; e.classList.add('show');
}

function togglePwd() {
  var inp = $('lp'); inp.type = inp.type === 'password' ? 'text' : 'password';
}

// Restaurar sesión si existe
(function () {
  try {
    var s = JSON.parse(sessionStorage.getItem('be_pend_sess'));
    if (s && (Date.now() - s.ts) < INACT_MS) {
      currentUser = { login: s.login, nombre: s.nombre, rol: s.rol };
      launchApp(currentUser);
    }
  } catch (e) {}
})();

/* ════════════════════════════════════════════
   CARGA DE PENDIENTES
   Usa el endpoint PendientesLista que retorna array real
════════════════════════════════════════════ */
function cargarPendientes() {
  $('grid-container').innerHTML = '<div class="g-spin"></div>';
  apiGet('PendientesLista').then(j => {
    pendientes = j.pendientes || [];
    actualizarStats();
    renderGrid();
    toast('✅ ' + pendientes.length + ' registros cargados', 'ok');
  }).catch(e => {
    $('grid-container').innerHTML = '<div class="grid"><div class="empty-state"><div class="empty-ico">⚠️</div><p class="empty-txt">Error al cargar: ' + esc(e.message) + '<br><small>Verifica que el Apps Script esté desplegado correctamente.</small></p></div></div>';
    toast('Error: ' + e.message, 'err');
  });
}

/* ════════════════════════════════════════════
   STATS
════════════════════════════════════════════ */
function actualizarStats() {
  var total = pendientes.length;
  var pend  = pendientes.filter(r => r.estado === 'Pendiente').length;
  var esp   = pendientes.filter(r => r.estado === 'En espera').length;
  var conf  = pendientes.filter(r => r.estado === 'Confirmado').length;
  var canc  = pendientes.filter(r => r.estado === 'Cancelado').length;
  setText('st-total', total);
  setText('st-pend',  pend);
  setText('st-esp',   esp);
  setText('st-conf',  conf);
  setText('st-canc',  canc);
}

function setFiltro(val, el) {
  filtroActivo = val;
  document.querySelectorAll('.stat-card').forEach(c => c.classList.remove('on'));
  if (el) el.classList.add('on');
  renderGrid();
}

/* ════════════════════════════════════════════
   RENDER GRID
════════════════════════════════════════════ */
function renderGrid() {
  var q    = $('search-inp').value.trim().toLowerCase();
  var sort = $('sort-sel').value;

  var lista = pendientes.filter(r => {
    if (filtroActivo !== 'todos' && r.estado !== filtroActivo) return false;
    if (!q) return true;
    return (r.nombre + r.telefono + r.correo + r.servicio + r.modal + r.motivo + r.origen_form)
      .toLowerCase().includes(q);
  });

  if (sort === 'nombre') {
    lista.sort((a, b) => a.nombre.localeCompare(b.nombre));
  } else if (sort === 'tipo') {
    lista.sort((a, b) => (a.origen_form || '').localeCompare(b.origen_form || ''));
  } else {
    // reciente: rowIndex mayor = más reciente
    lista.sort((a, b) => b.rowIndex - a.rowIndex);
  }

  if (!lista.length) {
    $('grid-container').innerHTML = '<div class="grid"><div class="empty-state"><div class="empty-ico">📭</div><p class="empty-txt">No hay registros' + (filtroActivo !== 'todos' ? ' en este estado' : '') + '.</p></div></div>';
    return;
  }

  var html = '<div class="grid">' + lista.map(r => buildCard(r)).join('') + '</div>';
  $('grid-container').innerHTML = html;
}

function buildCard(r) {
  var accentClass = { 'Pendiente':'a-pend','En espera':'a-espera','Confirmado':'a-conf','Cancelado':'a-canc' }[r.estado] || 'a-pend';
  var chipClass   = { 'Pendiente':'chip-pend','En espera':'chip-esp','Confirmado':'chip-conf','Cancelado':'chip-canc' }[r.estado] || 'chip-pend';
  var estadoEmoji = { 'Pendiente':'⏳','En espera':'🔵','Confirmado':'✅','Cancelado':'❌' }[r.estado] || '⏳';
  var tipoLabel   = { 'PAC':'👤 Paciente','EMP':'🏢 Empresa','ESC':'🏫 Escuela' }[r.tipo] || ('📋 ' + r.tipo);
  var origenLabel = r.origen_form || r.tipo || '—';

  var fechaStr = '—';
  if (r.fecha_registro) {
    try { fechaStr = new Date(r.fecha_registro).toLocaleDateString('es-MX', { day:'2-digit', month:'short', year:'numeric' }); } catch(e){}
  }

  var citaHtml = '';
  if (r.fecha_cita) {
    citaHtml = '<div class="pcard-cita">📅 Cita: <strong>' + esc(r.fecha_cita) + (r.hora_cita ? ' · ' + esc(r.hora_cita) : '') + '</strong></div>';
  }

  return '<div class="pcard" onclick="abrirModal(' + r.rowIndex + ')">'
    + '<div class="pcard-accent ' + accentClass + '"></div>'
    + '<div class="pcard-head">'
    +   '<div><div class="pcard-nombre">' + esc(r.nombre) + '</div><div class="pcard-id">' + esc(r.id) + '</div></div>'
    +   '<span class="chip ' + chipClass + '">' + estadoEmoji + ' ' + esc(r.estado) + '</span>'
    + '</div>'
    + '<div class="pcard-body">'
    +   '<div class="pcard-tipo">' + tipoLabel + '</div>'
    +   '📱 <strong>' + esc(r.telefono) + '</strong>'
    +   (r.correo ? ' · 📧 ' + esc(r.correo) : '') + '<br>'
    +   '🏷️ <strong>' + esc(r.modal || r.servicio || '—') + '</strong>'
    +   (r.motivo ? '<br>📝 ' + esc(r.motivo.substring(0,90)) + (r.motivo.length > 90 ? '…' : '') : '')
    +   citaHtml
    + '</div>'
    + '<div class="pcard-foot">'
    +   '<span class="pcard-ts">🕐 ' + fechaStr + ' · ' + esc(origenLabel) + '</span>'
    +   '<span class="pcard-act">Agendar →</span>'
    + '</div>'
    + '</div>';
}

/* ════════════════════════════════════════════
   MODAL AGENDAR
════════════════════════════════════════════ */
function abrirModal(rowIndex) {
  var r = pendientes.find(p => p.rowIndex === rowIndex);
  if (!r) return;
  registroActivo = r;
  slotActivo = null;

  // Prellenar contexto
  setText('m-nombre',  r.nombre);
  setText('m-tel',     r.telefono);
  setText('m-correo',  r.correo || '—');
  setText('m-servicio', r.servicio || '—');
  setText('m-modal-val', r.modal || '');
  $('m-modal-wrap').style.display = r.modal ? '' : 'none';
  setText('m-motivo', r.motivo || '');
  $('m-motivo-wrap').style.display = r.motivo ? '' : 'none';
  setText('m-origen', tipoLabel(r));

  // Mensaje sugerido
  $('n-msg').value = 'Hola ' + r.nombre.split(' ')[0] + ', hemos recibido tu solicitud de '
    + (r.modal || r.servicio || 'servicio') + '. En breve te confirmamos tu cita. ¡Gracias! 💜';

  $('btn-confirmar').disabled = true;
  $('modal-overlay').classList.add('show');
  document.body.style.overflow = 'hidden';

  cargarSlots();
}

function tipoLabel(r) {
  var t = { 'PAC':'👤 Cita personal','EMP':'🏢 Empresa','ESC':'🏫 Escuela' }[r.tipo] || '';
  return (t + (r.origen_form ? ' · ' + r.origen_form.replace(/_/g,' ') : ''));
}

function cerrarModal() {
  $('modal-overlay').classList.remove('show');
  document.body.style.overflow = '';
  registroActivo = null; slotActivo = null;
}

/* ════════════════════════════════════════════
   SLOTS
════════════════════════════════════════════ */
function cargarSlots() {
  var c = $('slots-container');
  c.innerHTML = '<div class="slot-loading"><div class="slot-spin"></div>Cargando disponibilidad…</div>';

  if (slotsCache && (Date.now() - slotsCache.ts) < 90000) {
    renderSlots(slotsCache.slots); return;
  }

  apiGet('DisponibilidadLista').then(j => {
    var slots = j.slots || [];
    slotsCache = { slots: slots, ts: Date.now() };
    renderSlots(slots);
  }).catch(e => {
    c.innerHTML = '<div class="no-slots">⚠️ No se pudo cargar disponibilidad.<br><small>' + esc(e.message) + '</small></div>';
  });
}

function renderSlots(slots) {
  var c = $('slots-container');
  if (!slots.length) {
    c.innerHTML = '<div class="no-slots">📭 No hay horarios disponibles próximamente.</div>';
    return;
  }
  var html = '<div class="slots-grid">';
  slots.forEach((s, i) => {
    var fecha = new Date(s.fecha + 'T12:00:00');
    html += '<div class="slot" id="slot-' + i + '" onclick="selSlot(' + i + ')">'
      + '<div class="s-dia">'  + (DIAS[fecha.getDay()]  || '—') + '</div>'
      + '<div class="s-num">'  + fecha.getDate()                 + '</div>'
      + '<div class="s-mes">'  + (MESES[fecha.getMonth()]|| '—') + '</div>'
      + (s.hora_inicio ? '<div class="s-hora">' + esc(s.hora_inicio) + (s.hora_fin ? '–' + esc(s.hora_fin) : '') + '</div>' : '')
      + '</div>';
  });
  html += '</div>';
  c.innerHTML = html;
  c._slots = slots;
}

function selSlot(i) {
  var c = $('slots-container');
  var slots = c._slots || (slotsCache ? slotsCache.slots : []);
  slotActivo = slots[i] || null;
  c.querySelectorAll('.slot').forEach(el => el.classList.remove('sel'));
  var el = c.querySelector('#slot-' + i);
  if (el) el.classList.add('sel');
  $('btn-confirmar').disabled = !slotActivo;
}

/* ════════════════════════════════════════════
   CONFIRMAR CITA
════════════════════════════════════════════ */
function confirmarCita() {
  if (!registroActivo || !slotActivo) return;
  var btn = $('btn-confirmar');
  btn.disabled = true; btn.textContent = '⏳ Enviando…';

  var r = registroActivo;
  var s = slotActivo;
  var msgExtra = $('n-msg').value.trim();
  var envWA    = $('n-wa').checked;
  var envEmail = $('n-email').checked;
  var envAdmin = $('n-admin').checked;

  var fechaObj = new Date(s.fecha + 'T12:00:00');
  var fechaLeg = (DIAS[fechaObj.getDay()]||'') + ' ' + fechaObj.getDate() + ' de ' + (MESES[fechaObj.getMonth()]||'');
  var horaLeg  = s.hora_inicio + (s.hora_fin ? ' – ' + s.hora_fin : '');

  // 1. Actualizar Pendientes en Sheets
  var p1 = apiPost('updatePendienteV3', { data: {
    rowIndex:   r.rowIndex,
    estado:     'En espera',
    fecha_cita: s.fecha,
    hora_cita:  s.hora_inicio,
    nota_cita:  s.nota || '',
    notificado: new Date().toISOString()
  }});

  // 2. Marcar slot ocupado
  var p2 = apiPost('markSlotOcupado', { rowIndex: s.rowIndex, reservadoPara: r.nombre + ' — ' + r.id });

  // 3. Correo (si aplica)
  var p3 = (envEmail && r.correo)
    ? apiPost('enviarCorreoSolicitud', { data: {
        nombre: r.nombre, telefono: r.telefono, correo: r.correo,
        servicio: r.modal || r.servicio, fecha: s.fecha,
        hora_inicio: s.hora_inicio, hora_fin: s.hora_fin || '',
        motivo: r.motivo || '', mensaje_extra: msgExtra
      }}).catch(() => {})
    : Promise.resolve();

  Promise.all([p1, p2, p3]).then(() => {
    // 4. WhatsApp solicitante
    if (envWA && r.telefono) {
      var tel = r.telefono.replace(/\D/g,'');
      if (tel.length === 10) tel = '52' + tel;
      var msgCli = '¡Hola ' + r.nombre.split(' ')[0] + '! 💜\n\n'
        + 'Hemos recibido tu solicitud de *' + (r.modal || r.servicio) + '*.\n'
        + '📅 Fecha tentativa: *' + fechaLeg + '*\n'
        + '🕐 Horario: *' + horaLeg + '*\n\n'
        + (msgExtra ? msgExtra + '\n\n' : '')
        + 'Te confirmaremos tu cita pronto. ¡Gracias! 🌿';
      window.open('https://wa.me/' + tel + '?text=' + encodeURIComponent(msgCli), '_blank');
    }

    // 5. WhatsApp admin
    if (envAdmin) {
      var msgAdm = '📋 *CITA EN ESPERA*\n\n'
        + '🪪 *ID:* '       + r.id         + '\n'
        + '👤 *Nombre:* '   + r.nombre     + '\n'
        + '📱 *Tel:* '      + r.telefono   + '\n'
        + (r.correo ? '📧 *Correo:* ' + r.correo + '\n' : '')
        + '🏷️ *Servicio:* ' + (r.modal || r.servicio) + '\n'
        + '📅 *Fecha:* '    + fechaLeg     + '\n'
        + '🕐 *Hora:* '     + horaLeg;
      window.open('https://wa.me/' + WA_ADMIN + '?text=' + encodeURIComponent(msgAdm), '_blank');
    }

    // Actualizar local
    var reg = pendientes.find(p => p.rowIndex === r.rowIndex);
    if (reg) { reg.estado = 'En espera'; reg.fecha_cita = s.fecha; reg.hora_cita = s.hora_inicio; }
    slotsCache = null; // invalidar cache de slots

    actualizarStats();
    renderGrid();
    cerrarModal();
    toast('✅ Cita agendada correctamente', 'ok');

  }).catch(e => {
    btn.disabled = false; btn.textContent = '📨 Confirmar y notificar';
    toast('Error: ' + e.message, 'err');
  });
}

/* ════════════════════════════════════════════
   CAMBIO RÁPIDO DE ESTADO (cancelar / confirmar directo)
════════════════════════════════════════════ */
function cambiarEstado(nuevoEstado) {
  if (!registroActivo) return;
  if (!confirm('¿Cambiar estado a "' + nuevoEstado + '"?')) return;

  apiPost('updatePendienteV3', { data: {
    rowIndex:   registroActivo.rowIndex,
    estado:     nuevoEstado,
    notificado: new Date().toISOString()
  }}).then(() => {
    var reg = pendientes.find(p => p.rowIndex === registroActivo.rowIndex);
    if (reg) reg.estado = nuevoEstado;
    actualizarStats();
    renderGrid();
    cerrarModal();
    toast('Estado actualizado a: ' + nuevoEstado, 'ok');
  }).catch(e => toast('Error: ' + e.message, 'err'));
}

/* ════════════════════════════════════════════
   UTILS
════════════════════════════════════════════ */
function $(id) { return document.getElementById(id); }
function setText(id, val) { var e = $(id); if (e) e.textContent = String(val != null ? val : ''); }
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function toast(msg, type) {
  var c = $('toasts'), t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeft = '3px solid ' + ({ ok:'#22C55E', err:'#EF4444', warn:'#F59E0B' }[type] || '#A67FFF');
  t.textContent = msg; c.appendChild(t);
  setTimeout(() => { t.style.opacity = '0'; t.style.transform = 'translateX(50px)'; t.style.transition = '.3s'; setTimeout(() => t.remove(), 350); }, 3500);
}

// Cerrar modal con Escape o clic en fondo
document.addEventListener('keydown', e => { if (e.key === 'Escape') cerrarModal(); });
$('modal-overlay').addEventListener('click', e => { if (e.target === $('modal-overlay')) cerrarModal(); });
</script>
