<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Debug — Formularios</title>
<style>
body{font-family:monospace;background:#12101e;color:#e2e8f0;margin:0;padding:1.5rem;}
h2{color:#A67FFF;margin-bottom:.5rem;}
.btn{background:#A67FFF;color:#fff;border:none;padding:.6rem 1.2rem;border-radius:8px;cursor:pointer;font-size:.9rem;margin:.3rem .3rem .3rem 0;}
.btn:hover{background:#FF85C0;}
.box{background:#1e1b2e;border:1px solid #2d2a4a;border-radius:10px;padding:1rem;margin-top:1rem;white-space:pre-wrap;word-break:break-all;font-size:.8rem;max-height:500px;overflow-y:auto;}
.ok{color:#22c55e;}
.err{color:#ef4444;}
.warn{color:#f59e0b;}
.sep{border-top:1px solid #2d2a4a;margin:1.5rem 0;}
label{font-size:.8rem;color:#A67FFF;display:block;margin-bottom:.3rem;}
input{background:#1e1b2e;border:1px solid #2d2a4a;color:#fff;padding:.5rem .8rem;border-radius:6px;width:100%;max-width:700px;font-family:monospace;font-size:.85rem;margin-bottom:.5rem;}
</style>
</head>
<body>

<h2>🔬 Debug — Formularios Pendientes</h2>

<label>URL del proxy (Apps Script)</label>
<input type="text" id="proxy-url" value="https://script.google.com/macros/s/AKfycbz-_1X-c3aZ2lJ4N6m3R5tP2l2cznIs7Seuvkb5X5J1oPVrIXDwkEHi936b4dXg5JxO/exec">

<div>
  <button class="btn" onclick="testFormularios()">▶ GET FormulariosPendientes</button>
  <button class="btn" onclick="testDisponibilidad()">▶ GET Disponibilidad</button>
  <button class="btn" onclick="testPendientes()">▶ GET Pendientes (hoja legacy)</button>
  <button class="btn" onclick="testCitasPersonales()">▶ GET Citas_Personales (raw)</button>
  <button class="btn" onclick="limpiar()">✕ Limpiar</button>
</div>

<div id="estado" class="box">Listo. Presiona un botón para probar.</div>

<script>
function proxy(){ return document.getElementById('proxy-url').value.trim(); }
function log(msg, tipo){
  var box = document.getElementById('estado');
  var cls = tipo==='ok'?'ok':tipo==='err'?'err':'warn';
  box.innerHTML += '<span class="'+cls+'">'+msg+'</span>\n';
  box.scrollTop = box.scrollHeight;
}
function limpiar(){ document.getElementById('estado').innerHTML = ''; }
function ts(){ return new Date().toLocaleTimeString('es-MX'); }

function testFormularios(){
  limpiar();
  log('['+ts()+'] GET ?tab=FormulariosPendientes ...','warn');
  fetch(proxy()+'?tab=FormulariosPendientes',{redirect:'follow'})
    .then(function(r){ log('HTTP status: '+r.status,'warn'); return r.text(); })
    .then(function(t){
      log('--- RESPUESTA RAW ---','warn');
      log(t,'');
      try{
        var j=JSON.parse(t);
        if(j.ok){
          log('\n--- PARSED OK ---','ok');
          log('Total formularios: '+( j.formularios ? j.formularios.length : 0),'ok');
          if(j.formularios && j.formularios.length){
            j.formularios.forEach(function(f,i){
              log('\n['+i+'] '+f._tipo+' | '+f._hoja+' fila '+f._rowIndex,'ok');
              log('    nombre:   '+f.nombre,'ok');
              log('    telefono: '+f.telefono,'ok');
              log('    correo:   '+f.correo,'ok');
              log('    servicio: '+f.servicio,'ok');
              log('    estado:   '+f.estado,'ok');
            });
          } else {
            log('⚠️  Array formularios vacío o ausente','warn');
            log('Claves en respuesta: '+Object.keys(j).join(', '),'warn');
          }
        } else {
          log('ERROR en respuesta: '+(j.error||JSON.stringify(j)),'err');
        }
      } catch(e){
        log('No es JSON válido: '+e.message,'err');
      }
    })
    .catch(function(e){ log('FETCH ERROR: '+e.message,'err'); });
}

function testDisponibilidad(){
  limpiar();
  log('['+ts()+'] GET ?tab=Disponibilidad ...','warn');
  fetch(proxy()+'?tab=Disponibilidad',{redirect:'follow'})
    .then(function(r){ log('HTTP status: '+r.status,'warn'); return r.text(); })
    .then(function(t){
      log('--- RESPUESTA RAW ---','warn');
      log(t.substring(0,2000),'');
      try{
        var j=JSON.parse(t);
        if(j.ok){
          log('\n--- PARSED OK ---','ok');
          log('Total slots: '+(j.slots?j.slots.length:0),'ok');
          if(j.slots&&j.slots.length){
            j.slots.slice(0,5).forEach(function(s,i){
              log('['+i+'] rowIndex:'+s.rowIndex+' | '+s.fecha+' '+s.hora_inicio+'-'+s.hora_fin+' | activo:'+s.activo,'ok');
            });
          }
        } else {
          log('ERROR: '+(j.error||JSON.stringify(j)),'err');
        }
      } catch(e){ log('No es JSON: '+e.message,'err'); }
    })
    .catch(function(e){ log('FETCH ERROR: '+e.message,'err'); });
}

function testPendientes(){
  limpiar();
  log('['+ts()+'] GET ?tab=Pendientes ...','warn');
  fetch(proxy()+'?tab=Pendientes',{redirect:'follow'})
    .then(function(r){ return r.text(); })
    .then(function(t){
      log(t.substring(0,3000),'');
    })
    .catch(function(e){ log('FETCH ERROR: '+e.message,'err'); });
}

function testCitasPersonales(){
  limpiar();
  log('['+ts()+'] GET ?tab=Citas_Personales ...','warn');
  fetch(proxy()+'?tab=Citas_Personales',{redirect:'follow'})
    .then(function(r){ return r.text(); })
    .then(function(t){
      log(t.substring(0,3000),'');
    })
    .catch(function(e){ log('FETCH ERROR: '+e.message,'err'); });
}
</script>
</body>
</html>
